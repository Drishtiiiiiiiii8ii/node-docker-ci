
name: CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository code
      - uses: actions/checkout@v4

      # Login to Docker Hub
      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Build Docker Image
      - name: Build Docker Image
        run: docker build -t drishtisehgal56/node-docker-ci:latest .

      # Tag Docker Image
      - name: Tag Docker Image
        run: docker tag drishtisehgal56/node-docker-ci:latest drishtisehgal56/node-docker-ci:v1

      # Push Docker Image
      - name: Push Docker Image
        run: |
          docker push drishtisehgal56/node-docker-ci:latest
          docker push drishtisehgal56/node-docker-ci:v1
