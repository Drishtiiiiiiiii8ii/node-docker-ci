name: CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository code
      - uses: actions/checkout@v4

      # 2️⃣ Login to Docker Hub safely
      - name: Docker Login
        run: echo "${{ secrets.DOCKER_DRISHTIIIIIII8II }}" | docker login -u "${{ secrets.DOCKER_DRISHTI123 }}" --password-stdin

      # 3️⃣ Build Docker Image
      - name: Build Docker Image
        run: docker build -t drishtisehgal56/node-docker-ci:latest .

      # 4️⃣ Tag Docker Image
      - name: Tag Docker Image
        run: docker tag drishtisehgal56/node-docker-ci:latest drishtisehgal56/node-docker-ci:v1

      # 5️⃣ Push Docker Image
      - name: Push Docker Image
        run: |
          docker push drishtisehgal56/node-docker-ci:latest
          docker push drishtisehgal56/node-docker-ci:v1